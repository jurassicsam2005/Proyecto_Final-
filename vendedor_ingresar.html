<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/estilos_inicio.css" />
    <link rel="icon" type="png" href="imagenes\logo_chico.png">
    <title>Crear Cuenta | Vendedor</title>
</head>
<body><center>
    <header>
        <a href="index.html">
        <img src="imagenes\logo_completo.png" alt="banner inicio" width="400" style="cursor: pointer;">
        </a>
    </header></center>

    <section class="signup">
            <div class="container signup-container">
                <div class="signup-header">
                    <h1>Comienza tu experiencia como vendedor</h1>
                    <p>Crea tu cuenta y empieza a ofrecer tus productos</p>
                </div>
                <form class="signup-form" action="php/crear_cuenta_vendedor.php" method="post">
                    <div class="form-group">
                        <label for="nombre">Nombre Completo</label>
                        <input type="text" id="nombre" name="nombre" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Correo Electrónico</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" name="password" required>
                    </div>
                    <div class="form-group">
                        <label for="confirm">Confirmar Contraseña</label>
                        <input type="password" id="confirm" name="confirm" required>
                    </div>
                    <div class="form-group">
                        <label for="nombre">Nombre de la Tienda</label>
                        <input type="text" id="nombre-tienda" name="nombre-tienda" required>
                    </div>
                    <div class="form-group">
                        <label for="direction">Dirección de Tienda</label>
                        <input type="text" id="direction" name="direction" required>
                    </div>
                    <div class="form-group">
                        <label for="rfc">RFC</label>
                        <input type="text" id="rfc" name="rfc" required>
                    </div>

                    <div class="form-group">
                        <label for="tipo-tienda"> Selecciona tu tipo de tienda</label>
                        <select id="tipo-tienda" name="tipo-tienda" >
                            <option>Abarrotes</option>
                            <option>Zapateria</option>
                            <option>Ferreteria</option>
                            <option>Tienda de ropa</option>
                            <option>Papeleria</option>
                            <option>Tecnologia</option>
                            <option>Otro</option>
                        </select>
                    </div>

                    <div class="form-check">
                        <input type="checkbox" id="terminos" name="terminos" required>
                        <label class="terminos">Acepto terminos y condiciones </label>
                    </div>
                    <br>
                    <button type="submit" class="signup-form button">Crear Cuenta</button>
                </form>

            </div>

        </section>

    <footer>© 2026 LocalComer - Todos los derechos reservados <br> Desarrollado por InnovaCode <br> Política de privacidad | Términos y condiciones | Contacto</footer>
</body>
</html>
