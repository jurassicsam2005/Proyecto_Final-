<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/estilos_inicio.css" />
    <link rel="icon" type="png" href="imagenes\logo_chico.png">
    <title>Crear Cuenta | Cliente</title>
</head>
<body><center>
    <header>
        <a href="index.html">
        <img src="imagenes\logo_completo.png" alt="banner inicio" width="400" style="cursor: pointer;">
        </a>
    </header></center>

    <section class="signup">
            <div class="container signup-container">
                <div class="signup-header">
                    <h1>Comienza tu experiencia como cliente</h1>
                    <p>Crea tu cuenta y empieza a buscar tus productos locales</p>
                </div>
                <form class="signup-form" action="php/crear_cuenta_cliente.php" method="post">
                    <div class="form-group">
                        <label for="nombre">Nombre completo</label>
                        <input type="text" id="nombre" name="nombre" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Correo electrónico</label>
                        <input type="email" id="email" name="email"  required>
                    </div>
                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" name="password" minlength="8" required>
                    </div>
                    <div class="form-group">
                        <label for="confirm">Confirmar contraseña</label>
                        <input type="password" id="confirm" name="confirm" required>
                    </div>
                    <div class="form-group">
                        <label for="direction">Dirección</label>
                        <input type="text" id="direction" name="direction" required>
                    </div>

                    <div class="form-check">
                        <input type="checkbox" id="terminos" name="terminos" required>
                        <label class="terminos">Acepto términos y condiciones </label>
                    </div>
                    <br>
                    <button type="submit" class="signup-form button">Crear cuenta</button>
                </form>

            </div>

        </section>

    <footer>© 2026 LocalComer - Todos los derechos reservados <br> Desarrollado por InnovaCode <br> Política de privacidad | Términos y condiciones | Contacto</footer>
</body>
</html>
